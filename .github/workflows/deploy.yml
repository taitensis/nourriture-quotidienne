# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Based on TinaCMS docs - use TINA_PUBLIC_CLIENT_ID not TINA_CLIENT_ID
      TINA_PUBLIC_CLIENT_ID: ${{ secrets.TINA_PUBLIC_CLIENT_ID }}
      TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
      TINA_PUBLIC_BRANCH: ${{ github.ref_name }}
      # Keep the old ones for backward compatibility
      TINA_CLIENT_ID: ${{ secrets.TINA_PUBLIC_CLIENT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Verify Tina envs (no secrets printed)
        shell: bash
        run: |
          [[ -n "$TINA_PUBLIC_CLIENT_ID" ]] || { echo "❌ TINA_PUBLIC_CLIENT_ID is missing"; exit 1; }
          [[ -n "$TINA_TOKEN" ]] || { echo "❌ TINA_TOKEN is missing"; exit 1; }
          echo "✅ TINA_PUBLIC_CLIENT_ID length: ${#TINA_PUBLIC_CLIENT_ID}"
          echo "✅ TINA_TOKEN length: ${#TINA_TOKEN}"

      - name: Clean old admin
        run: rm -rf public/admin

      # Build TinaCMS according to official docs
      - name: Build TinaCMS
        env:
          TINA_PUBLIC_CLIENT_ID: ${{ secrets.TINA_PUBLIC_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
        run: npx tinacms build

      # Verify admin was built
      - name: Verify TinaCMS admin build
        run: |
          if [ -d "public/admin" ]; then
            echo "✅ TinaCMS admin built successfully"
            ls -la public/admin/
          else
            echo "❌ TinaCMS admin build failed"
            exit 1
          fi

      # Build Astro (picks up public/admin)
      - name: Build Astro
        run: npx astro build

      # Verify the final build contains admin
      - name: Verify final build
        run: |
          if [ -d "dist/admin" ]; then
            echo "✅ Admin folder present in final build"
          else
            echo "⚠️ Admin folder missing in final build"
          fi
          echo "Contents of dist:"
          ls -la dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
