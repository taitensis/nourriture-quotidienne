name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Astro (Tina env included)
        uses: withastro/action@v3
        with:
          node-version: 20
        env:
          TINA_CLIENT_ID: ${{ secrets.TINA_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
          TINA_BRANCH: main
          # (optional) if you also created PUBLIC_TINA_CLIENT_ID:
          PUBLIC_TINA_CLIENT_ID: ${{ secrets.TINA_CLIENT_ID }}

      - name: Prefix Tina admin asset paths for GitHub Pages
        run: |
          ADMIN="dist/admin/index.html"
          if [ -f "$ADMIN" ]; then
            sed -i 's|src="/admin/|src="/nourriture-quotidienne/admin/|g' "$ADMIN"
            sed -i 's|href="/admin/|href="/nourriture-quotidienne/admin/|g' "$ADMIN"
          else
            echo "No dist/admin/index.html found"; ls -la dist || true
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
