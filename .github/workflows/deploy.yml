# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Must match .tina/config.ts exactly:
      TINA_CLIENT_ID: ${{ secrets.TINA_CLIENT_ID }}
      TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
      TINA_PUBLIC_BRANCH: ${{ github.ref_name }} # or "main"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Verify Tina envs (no secrets printed)
        shell: bash
        run: |
          [[ -n "$TINA_CLIENT_ID" ]] || { echo "❌ TINA_CLIENT_ID is missing"; exit 1; }
          [[ -n "$TINA_TOKEN" ]] || { echo "❌ TINA_TOKEN is missing"; exit 1; }
          echo "✅ TINA_CLIENT_ID length: ${#TINA_CLIENT_ID}"
          echo "✅ TINA_TOKEN length: ${#TINA_TOKEN}"

      - name: Clean old admin
        run: rm -rf public/admin

      # 1) Build Tina admin into public/admin
      - name: Build TinaCMS
        run: npx tinacms build

      # 2) Build Astro (picks up public/admin)
      - name: Build Astro
        run: npx astro build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
