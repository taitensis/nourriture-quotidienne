# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TINA_PUBLIC_CLIENT_ID: ${{ secrets.TINA_PUBLIC_CLIENT_ID }}
      TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
      TINA_PUBLIC_BRANCH: ${{ github.ref_name }}
      TINA_CLIENT_ID: ${{ secrets.TINA_PUBLIC_CLIENT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Check TinaCMS installation
        run: |
          echo "Checking TinaCMS packages..."
          npm list tinacms @tinacms/cli || true
          echo "Checking if tinacms command is available..."
          npx tinacms --version || echo "TinaCMS CLI not found"

      - name: Verify Tina envs and config
        shell: bash
        run: |
          [[ -n "$TINA_PUBLIC_CLIENT_ID" ]] || { echo "❌ TINA_PUBLIC_CLIENT_ID is missing"; exit 1; }
          [[ -n "$TINA_TOKEN" ]] || { echo "❌ TINA_TOKEN is missing"; exit 1; }
          echo "✅ TINA_PUBLIC_CLIENT_ID length: ${#TINA_PUBLIC_CLIENT_ID}"
          echo "✅ TINA_TOKEN length: ${#TINA_TOKEN}"
          echo "Tina config file exists:" 
          ls -la .tina/ || echo "No .tina directory"
          if [ -f ".tina/config.ts" ]; then
            echo "Config file found"
          else
            echo "❌ No .tina/config.ts found!"
          fi

      - name: Clean old admin
        run: rm -rf public/admin

      # Build TinaCMS with verbose output
      - name: Build TinaCMS (verbose)
        env:
          TINA_PUBLIC_CLIENT_ID: ${{ secrets.TINA_PUBLIC_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
        run: |
          echo "Starting TinaCMS build..."
          npx tinacms build --verbose || npx tinacms build
          echo "TinaCMS build completed"

      # Verify what was actually built
      - name: Debug TinaCMS build output
        run: |
          echo "=== Contents of public/ ==="
          ls -la public/ || echo "No public directory"
          if [ -d "public/admin" ]; then
            echo "=== Contents of public/admin/ ==="
            ls -la public/admin/
            echo "=== Contents of public/admin/assets/ ==="
            ls -la public/admin/assets/ 2>/dev/null || echo "No assets directory"
            if [ -f "public/admin/index.html" ]; then
              echo "=== First 20 lines of admin/index.html ==="
              head -20 public/admin/index.html
            fi
          else
            echo "❌ No admin directory created!"
          fi

      # Build Astro
      - name: Build Astro
        run: npx astro build

      # Final verification
      - name: Final build verification
        run: |
          echo "=== Final dist contents ==="
          ls -la dist/
          if [ -d "dist/admin" ]; then
            echo "=== Final admin contents ==="
            ls -la dist/admin/
            echo "=== Final admin assets ==="
            ls -la dist/admin/assets/ 2>/dev/null || echo "No final assets"
          else
            echo "❌ No admin in final build!"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
